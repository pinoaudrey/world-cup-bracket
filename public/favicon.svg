<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- one rim pentagon (bottom); the others are rotations around the center -->
    <polygon id="r" points="32,48 37.71,52.15 35.53,58.85 28.47,58.85 26.29,52.15" />
  </defs>
  <circle cx="32" cy="32" r="29" fill="#ffffff" stroke="#0f1115" stroke-width="3" />
  <!-- seams from the central pentagon's corners out to the rim -->
  <g stroke="#0f1115" stroke-width="2.4" stroke-linecap="round">
    <line x1="32" y1="21" x2="32" y2="4" />
    <line x1="42.46" y1="28.6" x2="58.6" y2="23" />
    <line x1="38.47" y1="40.9" x2="48.7" y2="55" />
    <line x1="25.53" y1="40.9" x2="15.3" y2="55" />
    <line x1="21.54" y1="28.6" x2="5.4" y2="23" />
  </g>
  <!-- black panels: central pentagon + five rim pentagons -->
  <g fill="#0f1115">
    <polygon points="32,21 42.46,28.6 38.47,40.9 25.53,40.9 21.54,28.6" />
    <use href="#r" />
    <use href="#r" transform="rotate(72 32 32)" />
    <use href="#r" transform="rotate(144 32 32)" />
    <use href="#r" transform="rotate(216 32 32)" />
    <use href="#r" transform="rotate(288 32 32)" />
  </g>
</svg>
